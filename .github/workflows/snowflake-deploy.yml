name: Snowflake deployment

on:
  pull_request:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Snowflake environment to deploy
        required: true
        default: development
        type: choice
        options:
          - development
          - production

permissions:
  contents: read

concurrency:
  group: snowflake-${{ github.event_name == 'workflow_dispatch' && inputs.environment || github.event_name == 'pull_request' && github.event.pull_request.number || github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  deploy-development:
    name: Deploy isolated development
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'development' || vars.ENABLE_SNOWFLAKE_CD == 'true' && (github.event_name == 'pull_request' || github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment: development
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_ROLE }}
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_WAREHOUSE: ${{ vars.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_SCHEMA: DBT_GHA_${{ github.run_id }}
      SNOWFLAKE_CLONE_DATABASE: ARR_LAB_PR_${{ github.run_id }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Configure dbt profile
        run: cp profiles.example.yml profiles.yml

      - name: Build dbt image
        run: docker compose build

      - name: Validate Snowflake connection
        run: docker compose run --rm dbt debug --target snowflake_dev

      - name: Create zero-copy Snowflake clone
        env:
          SNOWFLAKE_SOURCE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_TARGET_DATABASE: ${{ env.SNOWFLAKE_CLONE_DATABASE }}
        run: |
          docker compose run --rm dbt run-operation clone_snowflake_database --target snowflake_dev --args "{\"source_database\": \"${SNOWFLAKE_SOURCE_DATABASE}\", \"target_database\": \"${SNOWFLAKE_TARGET_DATABASE}\"}"

      - name: Deploy to isolated Snowflake schemas
        env:
          SNOWFLAKE_DATABASE: ${{ env.SNOWFLAKE_CLONE_DATABASE }}
        run: |
          docker compose run --rm dbt seed --full-refresh --target snowflake_dev
          docker compose run --rm dbt build --target snowflake_dev

      - name: Deploy Snowflake semantic view
        if: vars.ENABLE_SNOWFLAKE_SEMANTIC_VIEW == 'true'
        env:
          SNOWFLAKE_DATABASE: ${{ env.SNOWFLAKE_CLONE_DATABASE }}
        run: |
          docker compose run --rm --entrypoint python dbt scripts/deploy_snowflake_semantic_view.py

      - name: Drop zero-copy Snowflake clone
        if: always()
        env:
          SNOWFLAKE_SOURCE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_TARGET_DATABASE: ${{ env.SNOWFLAKE_CLONE_DATABASE }}
        run: |
          docker compose run --rm dbt run-operation drop_snowflake_database --target snowflake_dev --args "{\"database_name\": \"${SNOWFLAKE_TARGET_DATABASE}\"}"

  deploy-production:
    name: Deploy production
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ vars.SNOWFLAKE_ROLE }}
      SNOWFLAKE_DATABASE: ${{ vars.SNOWFLAKE_DATABASE }}
      SNOWFLAKE_WAREHOUSE: ${{ vars.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_SCHEMA: DBT_PROD

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure dbt profile
        run: cp profiles.example.yml profiles.yml

      - name: Build dbt image
        run: docker compose build

      - name: Validate Snowflake connection
        run: docker compose run --rm dbt debug --target prod

      - name: Deploy to production schemas
        run: |
          docker compose run --rm dbt seed --full-refresh --target prod
          docker compose run --rm dbt build --target prod

      - name: Deploy Snowflake semantic view
        if: vars.ENABLE_SNOWFLAKE_SEMANTIC_VIEW == 'true'
        run: |
          docker compose run --rm --entrypoint python dbt scripts/deploy_snowflake_semantic_view.py
